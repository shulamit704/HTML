<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="rishum.js"></script>
    <style>
         body{
            background-color: rgb(0, 0, 0);
            padding-top: 0;
            margin: 0;
        }
        .picture{
            background-image: url(b.webp );
            height: 100vh;
            background-size: cover;
            background-position: center;
            padding-top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
             }
        form{
            gap: 20px;
            background-color: rgba(27, 28, 65, 0.5);
            width: 300px; 
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border:solid red;
        }
        h1{
           text-align: center;
            color: rgb(255, 0, 0);
        }
        input{
            height: 30px;
            width: 230px;
            font-size: large;  
         text-align: right;
         background-color: rgb(255, 255, 255,-1);
         border: solid red 0.15px;
         color: rgb(255, 255, 255);
        }
        button{
            width: 100px;
            height: 30px;
            background-color: red;
            text-align: center;
        }

    </style>
</head>
<body>
    <div class="picture">
    <form id="form">
     <h1>רישום</h1>
    <input required placeholder="name" class="name" type="text">
    <input required placeholder="password" class="password" type="password">
    <input required placeholder="mail" class="mail" type="text">
    <button class="button" type="submit">לאישור</button>
</form>
</div>
</body>
</html>
